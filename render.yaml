services:
  - type: web
    name: imprint-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: imprint-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: IMPRINT_DB_PATH
        value: /data/imprint.db
      - key: ALLOWED_ORIGINS
        value: https://imprint-digital.jp,https://imprint-dje.pages.dev
      - key: IMPRINT_ADMIN_KEY
        sync: false
      - key: POLYGON_RPC_URL
        sync: false
      - key: POLYGON_PRIVATE_KEY
        sync: false
      - key: IMPRINT_CONTRACT_ADDRESS
        sync: false
      - key: POLYGON_CHAIN_ID
        value: "80002"
      - key: API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
