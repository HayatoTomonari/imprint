<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 — Imprint</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #f9fafb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .brand {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #fff;
      margin-bottom: 6px;
    }
    .brand-sub { font-size: 13px; color: #6b7280; margin-bottom: 36px; }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 14px;
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
    }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .card-sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #d1d5db; margin-bottom: 7px; }
    input[type="email"], input[type="password"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      color: #f9fafb;
      outline: none;
      transition: border-color .15s;
    }
    input[type="email"]:focus, input[type="password"]:focus {
      border-color: #6366f1;
    }
    .btn {
      width: 100%;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      margin-top: 8px;
    }
    .btn:hover { background: #4f46e5; }
    .error {
      background: #2a1215;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 11px 14px;
      color: #fca5a5;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .plan-box {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.7;
    }
    .plan-box strong { color: #a5b4fc; }
    .footer-link { margin-top: 22px; text-align: center; font-size: 13px; color: #6b7280; }
    .footer-link a { color: #818cf8; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="brand">Imprint</div>
  <div class="brand-sub">Photo Authenticity Verification</div>

  <div class="card">
    <div class="card-title">無料アカウントを作成</div>
    <div class="card-sub">クレジットカード不要・すぐに使い始められます</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="plan-box">
      <strong>Starter プラン（無料）</strong>でスタート<br>
      月50回まで APIを利用可能。Businessプランにアップグレードすると月1,000回まで利用できます。
    </div>

    <form method="POST" action="/auth/register">
      <div class="field">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="password">パスワード（8文字以上）</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="new-password" minlength="8">
      </div>
      <div class="field">
        <label for="password_confirm">パスワード（確認）</label>
        <input type="password" id="password_confirm" name="password_confirm" required placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn" type="submit">アカウントを作成</button>
    </form>

    <div class="footer-link">
      既にアカウントをお持ちですか？ <a href="/login">ログイン</a>
    </div>
  </div>
</body>
</html>
