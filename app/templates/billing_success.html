<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アップグレード完了 — Imprint</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #f9fafb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 14px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    .title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .desc {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .plan-badge {
      display: inline-block;
      background: #312e81;
      color: #a5b4fc;
      border-radius: 999px;
      padding: 4px 16px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s;
    }
    .btn:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <div class="title">アップグレード完了！</div>
    <div class="desc">
      Businessプランへのアップグレードが完了しました。<br>
      月1,000回のAPI利用が可能になりました。
    </div>
    <div class="plan-badge">Business プラン</div><br>
    <a class="btn" href="/">ダッシュボードへ戻る</a>
  </div>
</body>
</html>
